<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | PsalmTech ICT Services</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="index.html#services">Services</a>
        <a href="contact.html" style="color: #e63946;">Contact</a>
    </nav>

    <header class="contact-header">
        <h1>Get In Touch</h1>
        <p>Have a project in mind? Let’s build something great together.</p>
    </header>

    <section class="contact-container">
        <div class="contact-info-panel">
            <h2>Contact Information</h2>
            <p>Fill out the form and our team will get back to you within 24 hours.</p>
            
            <div class="info-item">
                <i class="fas fa-phone-alt"></i>
                <span>09123456789</span>
            </div>
            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <span>psalmtech@gmail.com</span>
            </div>
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Cebu City, Philippines</span>
            </div>

            <div class="social-links">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
            </div>
        </div>

        <div class="contact-form-panel">
            <form id="mainContactForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <select>
                        <option>Web Development</option>
                        <option>Tech Support</option>
                        <option>Programming Tutorials</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea placeholder="How can we help you?" rows="5" required></textarea>
                </div>
                <button type="submit" class="red-btn">SEND MESSAGE <i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </section>

    <footer>
        <p>© 2026 PsalmTech ICT Services | Cebu, Philippines</p>
    </footer>

    <script>
        document.getElementById('mainContactForm').onsubmit = function(e) {
            e.preventDefault();
            alert("Thank you! Your message has been sent to PsalmTech.");
        }
    </script>
</body>
</html>
